<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EROS Dashboard — Login</title>
  <style>
    :root {
      --bg: #0f172a; --bg-2: #1e293b; --fg: #e2e8f0;
      --muted: #94a3b8; --accent: #f59e0b; --border: #334155; --err: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--bg) 0%, #1a2842 100%);
      color: var(--fg);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 36px 32px;
      width: 360px;
      max-width: 92vw;
      box-shadow: 0 18px 50px rgba(0,0,0,0.4);
    }
    .login-title {
      color: var(--accent);
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: 0.02em;
    }
    .login-sub {
      color: var(--muted);
      font-size: 0.84rem;
      margin: 0 0 28px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; color: var(--muted); font-size: 0.78rem;
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em;
    }
    .field input {
      width: 100%; padding: 10px 14px;
      background: var(--bg); color: var(--fg);
      border: 1px solid var(--border); border-radius: 4px;
      font-family: inherit; font-size: 0.95rem; outline: none;
    }
    .field input:focus { border-color: var(--accent); }
    button {
      width: 100%; padding: 12px;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 4px;
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background 0.12s ease;
    }
    button:hover { background: #d97706; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--err);
      color: var(--err);
      padding: 10px 14px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 0.86rem;
      display: none;
    }
    .error.show { display: block; }
    .footer {
      margin-top: 22px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.74rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <form class="login-card" id="login-form" autocomplete="on">
    <h1 class="login-title">🛡 EROS Dashboard</h1>
    <p class="login-sub">Sign in to view skills, strategies, audits, and live data.</p>

    <div id="error" class="error"></div>

    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" autofocus />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />
    </div>

    <button type="submit" id="submit-btn">Sign in →</button>

    <div class="footer">
      Local-only access · EROS internal tool · 2026
    </div>
  </form>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: form.username.value,
            password: form.password.value,
          }),
        });
        const data = await r.json();
        if (r.ok && data.ok) {
          // Redirect to original destination (passed via ?next=...) or root
          const params = new URLSearchParams(location.search);
          location.href = params.get('next') || '/';
        } else {
          errorEl.textContent = data.error || 'Invalid credentials.';
          errorEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Sign in →';
        }
      } catch (e) {
        errorEl.textContent = `Network error: ${e.message}`;
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Sign in →';
      }
    });
  </script>
</body>
</html>
